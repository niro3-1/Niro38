<script>
function updateStrengthIndicator(password) {
    const strengthIndicator = document.getElementById('strength-indicator');
    let strength = 0;
    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    switch (strength) {
        case 0:
            strengthIndicator.innerText = 'Very Weak';
            break;
        case 1:
            strengthIndicator.innerText = 'Weak';
            break;
        case 2:
            strengthIndicator.innerText = 'Moderate';
            break;
        case 3:
            strengthIndicator.innerText = 'Strong';
            break;
        case 4:
            strengthIndicator.innerText = 'Very Strong';
            break;
    }
}
</script>

<input type='password' oninput='updateStrengthIndicator(this.value)' placeholder='Enter password'>
<div id='strength-indicator'></div>
